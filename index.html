<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Code School — 源码架构学习教程</title>
  <meta name="description" content="从零到一深度解析 Claude Code 源码架构，面向所有对 AI Agent 感兴趣的人">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #E8632A;
      --sidebar-width: 300px;
      --sidebar-nav-link-color--active: #E8632A;
      --sidebar-nav-link-border-color--active: #E8632A;
      --code-theme-background: #1e1e2e;
      --code-theme-text: #cdd6f4;
      --code-inline-background: #2d2d3f;
      --heading-color: #1a1a2e;
    }

    /* ===== 侧边栏标题单行显示 ===== */
    .app-name-link {
      font-weight: 700;
      font-size: 1.0em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .app-name {
      white-space: nowrap;
    }

    /* ===== 强制侧边栏始终展开 ===== */
    .sidebar {
      left: 0 !important;
      transform: translateX(0) !important;
      width: var(--sidebar-width) !important;
    }
    body.close .sidebar {
      transform: translateX(0) !important;
    }
    .sidebar-toggle {
      display: none !important;
    }
    /* 内容区域左移适配更宽侧边栏 */
    .content {
      margin-left: var(--sidebar-width) !important;
    }

    /* ===== Sidebar group headings ===== */
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      color: #E8632A;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 1.2em 0 0.3em;
    }

    /* ===== 标题样式 ===== */
    .markdown-section h1 {
      border-bottom: 3px solid #E8632A;
      padding-bottom: 0.4em;
      color: #1a1a2e;
    }
    .markdown-section h2 {
      border-left: 4px solid #E8632A;
      padding-left: 0.6em;
      margin-top: 2em;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section blockquote {
      border-left: 4px solid #E8632A;
      background: #fff8f5;
      padding: 0.8em 1em;
      color: #555;
    }

    /* ===== 代码块：统一黑底灰字 ===== */
    /* 行内代码 */
    .markdown-section code {
      background: #1e1e2e !important;
      color: #cdd6f4 !important;
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.88em;
    }
    /* 代码块 */
    .markdown-section pre {
      background: #1e1e2e !important;
      border-radius: 8px;
      border: none;
    }
    .markdown-section pre > code {
      background: transparent !important;
      color: #cdd6f4 !important;
      padding: 0;
      font-size: 0.875em;
    }
    /* Prism 高亮覆盖 */
    .token.comment,
    .token.prolog,
    .token.doctype,
    .token.cdata {
      color: #6c7086;
    }
    .token.punctuation { color: #cdd6f4; }
    .token.property,
    .token.tag,
    .token.boolean,
    .token.number,
    .token.constant,
    .token.symbol { color: #fab387; }
    .token.selector,
    .token.attr-name,
    .token.string,
    .token.char,
    .token.builtin { color: #a6e3a1; }
    .token.operator,
    .token.entity,
    .token.url,
    .language-css .token.string,
    .style .token.string { color: #89dceb; }
    .token.atrule,
    .token.attr-value,
    .token.keyword { color: #cba6f7; }
    .token.function { color: #89b4fa; }
    .token.regex,
    .token.important,
    .token.variable { color: #f38ba8; }

    /* ===== Callout boxes ===== */
    .tip, .warning, .danger {
      border-radius: 6px;
      padding: 0.8em 1em;
      margin: 1em 0;
    }

    /* ===== 分页导航（下一章/上一章）样式修复 ===== */
    .pagination-item {
      display: flex !important;
      align-items: center;
    }
    .pagination-item a {
      display: block !important;
      pointer-events: auto !important;
      cursor: pointer !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🎓 Claude Code School',
      repo: 'https://github.com/OpenDemon/claude-code-school',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      relativePath: false,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 4,
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [],
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    // 追加 Mermaid 插件，不覆盖已有插件（如 docsify-pagination）
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {
        hook.doneEach(function() {
          document.querySelectorAll('.mermaid').forEach(function(el) {
            if (el.getAttribute('data-processed')) return;
            var code = el.textContent;
            var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            try {
              mermaid.render(id, code).then(function(result) {
                el.innerHTML = result.svg;
                el.setAttribute('data-processed', 'true');
              });
            } catch(e) {
              console.warn('Mermaid render error:', e);
            }
          });
        });
      }
    ]);
  </script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
