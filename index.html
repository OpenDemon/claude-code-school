<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Code School — 源码架构学习教程</title>
  <meta name="description" content="从零到一深度解析 Claude Code 源码架构，面向所有对 AI Agent 感兴趣的人">
  <!-- 移动端关键 meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 微信/iOS 全屏 Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <!-- 微信分享 OG -->
  <meta property="og:title" content="Claude Code School — 源码架构学习教程">
  <meta property="og:description" content="从零到一深度解析 Claude Code 512K 行源码，面向所有对 AI Agent 感兴趣的人">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    /* ============================================================
       全局变量
    ============================================================ */
    :root {
      --base-font-size: 15px;
      --theme-color: #E8632A;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #E8632A;
      --sidebar-nav-link-border-color--active: #E8632A;
      --code-theme-background: #1e1e2e;
      --code-theme-text: #cdd6f4;
      --code-inline-background: #2d2d3f;
      --heading-color: #1a1a2e;
    }

    /* ============================================================
       桌面端：侧边栏始终展开
    ============================================================ */
    @media (min-width: 769px) {
      .sidebar {
        left: 0 !important;
        transform: translateX(0) !important;
        width: var(--sidebar-width) !important;
      }
      body.close .sidebar {
        transform: translateX(0) !important;
      }
      .sidebar-toggle {
        display: none !important;
      }
      .content {
        margin-left: var(--sidebar-width) !important;
      }
    }

    /* ============================================================
       移动端（≤768px）：侧边栏抽屉式，跟随 Docsify 原生 body.close 逻辑
    ============================================================ */
    @media (max-width: 768px) {
      /*
       * Docsify 原生逻辑：
       *   - 默认：body 无 close 类 → 侧边栏展开（left:0）
       *   - 点击汉堡：body 加 close 类 → 侧边栏收起
       * 我们在移动端反转这个逻辑：
       *   - 默认（无 close）：隐藏（translateX(-100%)）
       *   - 有 close 类时：也隐藏（Docsify 的收起状态）
       *   - 点击汉堡后 Docsify 移除 close → 展开
       * 但 Docsify 初始状态不一定有 close，所以用 JS 在初始化时加 close
       */

      /* 侧边栏基础样式 */
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 85vw !important;
        max-width: 320px !important;
        height: 100dvh !important;
        height: 100vh !important;
        z-index: 200 !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        transition: transform 0.28s cubic-bezier(0.4,0,0.2,1) !important;
        background: #fff !important;
        box-shadow: none !important;
      }

      /* 收起状态（body.close 或 body 初始无 open 类）*/
      body:not(.sidebar-open) .sidebar {
        transform: translateX(-100%) !important;
        box-shadow: none !important;
      }

      /* 展开状态 */
      body.sidebar-open .sidebar {
        transform: translateX(0) !important;
        box-shadow: 4px 0 24px rgba(0,0,0,0.18) !important;
      }

      /* 遮罩层：展开时显示 */
      body.sidebar-open::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.45);
        z-index: 199;
        -webkit-tap-highlight-color: transparent;
      }

      /* 汉堡菜单按钮：移动端显示 */
      .sidebar-toggle {
        display: flex !important;
        align-items: center;
        justify-content: center;
        position: fixed !important;
        top: 12px !important;
        left: 12px !important;
        z-index: 300 !important;
        width: 42px !important;
        height: 42px !important;
        background: #E8632A !important;
        border-radius: 10px !important;
        box-shadow: 0 2px 10px rgba(232,99,42,0.45) !important;
        cursor: pointer !important;
      }
      .sidebar-toggle span {
        background: #fff !important;
      }

      /* 内容区：不需要左边距 */
      .content {
        margin-left: 0 !important;
        padding-top: 64px !important;
      }

      /* 主内容区内边距 */
      .markdown-section {
        padding: 16px !important;
        max-width: 100% !important;
      }

      /* 标题字体缩小 */
      .markdown-section h1 { font-size: 1.5em !important; }
      .markdown-section h2 { font-size: 1.25em !important; }
      .markdown-section h3 { font-size: 1.1em !important; }

      /* 代码块：横向滚动，不溢出 */
      .markdown-section pre {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        max-width: 100% !important;
        white-space: pre !important;
        word-break: normal !important;
        word-wrap: normal !important;
      }
      .markdown-section pre > code {
        white-space: pre !important;
        word-break: normal !important;
      }

      /* 行内代码：允许换行 */
      .markdown-section p code,
      .markdown-section li code {
        word-break: break-all !important;
        white-space: pre-wrap !important;
      }

      /* 表格：横向滚动 */
      .markdown-section table {
        display: block !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        white-space: nowrap !important;
        max-width: 100% !important;
      }

      /* 分页导航：竖向排列 */
      .docsify-pagination-container {
        flex-direction: column !important;
        gap: 12px !important;
      }
      .pagination-item {
        width: 100% !important;
      }
      .pagination-item--next {
        margin-left: 0 !important;
        text-align: left !important;
      }

      /* Mermaid 图：横向滚动 */
      .mermaid {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* 搜索框：全宽 */
      .search input {
        width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 微信底部安全区适配 */
      .content {
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }

    /* ============================================================
       侧边栏标题单行显示（所有屏幕）
    ============================================================ */
    .app-name-link {
      font-weight: 700;
      font-size: 1.0em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .app-name {
      white-space: nowrap;
      overflow: hidden;
    }

    /* ============================================================
       侧边栏分组标题
    ============================================================ */
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      color: #E8632A;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 1.2em 0 0.3em;
    }

    /* ============================================================
       正文样式
    ============================================================ */
    .markdown-section h1 {
      border-bottom: 3px solid #E8632A;
      padding-bottom: 0.4em;
      color: #1a1a2e;
    }
    .markdown-section h2 {
      border-left: 4px solid #E8632A;
      padding-left: 0.6em;
      margin-top: 2em;
    }
    .markdown-section table {
      width: 100%;
    }
    .markdown-section blockquote {
      border-left: 4px solid #E8632A;
      background: #fff8f5;
      padding: 0.8em 1em;
      color: #555;
    }

    /* ============================================================
       代码块：统一黑底灰字
    ============================================================ */
    .markdown-section code {
      background: #1e1e2e !important;
      color: #cdd6f4 !important;
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.88em;
    }
    .markdown-section pre {
      background: #1e1e2e !important;
      border-radius: 8px;
      border: none;
    }
    .markdown-section pre > code {
      background: transparent !important;
      color: #cdd6f4 !important;
      padding: 0;
      font-size: 0.875em;
    }

    /* Prism 语法高亮 */
    .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #6c7086; }
    .token.punctuation { color: #cdd6f4; }
    .token.property, .token.tag, .token.boolean, .token.number,
    .token.constant, .token.symbol { color: #fab387; }
    .token.selector, .token.attr-name, .token.string,
    .token.char, .token.builtin { color: #a6e3a1; }
    .token.operator, .token.entity, .token.url,
    .language-css .token.string, .style .token.string { color: #89dceb; }
    .token.atrule, .token.attr-value, .token.keyword { color: #cba6f7; }
    .token.function { color: #89b4fa; }
    .token.regex, .token.important, .token.variable { color: #f38ba8; }

    /* ============================================================
       作者卡片（侧边栏底部）
    ============================================================ */
    /* 首页作者卡片 */
    .author-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: linear-gradient(135deg, #fff8f5 0%, #fff3ee 100%);
      border: 1px solid #f0d5c8;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 20px 0;
    }
    .author-qr-img {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      border: 2px solid #f0d5c8;
      flex-shrink: 0;
      object-fit: cover;
    }
    .author-info {
      flex: 1;
    }
    .author-name {
      font-weight: 700;
      font-size: 1.1em;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .author-desc {
      font-size: 0.85em;
      color: #666;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .author-links {
      margin-bottom: 6px;
    }
    .author-link {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.82em;
      font-weight: 600;
      text-decoration: none !important;
      transition: all 0.2s;
    }
    .github-link {
      background: #1a1a2e;
      color: #fff !important;
    }
    .github-link:hover {
      background: #E8632A;
      transform: translateY(-1px);
    }
    .qr-tip {
      font-size: 0.78em;
      color: #999;
    }
    /* 侧边栏底部作者卡片 */
    .sidebar .author-card {
      flex-direction: column;
      text-align: center;
      padding: 12px;
      margin: 12px 8px 8px;
      gap: 8px;
    }
    .sidebar .author-qr-img {
      width: 90px;
      height: 90px;
      margin: 0 auto;
    }
    .sidebar .author-info {
      text-align: center;
    }
    .sidebar .author-name {
      font-size: 0.95em;
    }
    .sidebar .author-desc {
      font-size: 0.72em;
    }

    /* ============================================================
       分页导航
    ============================================================ */
    .pagination-item {
      display: flex !important;
      align-items: center;
    }
    .pagination-item a {
      display: block !important;
      pointer-events: auto !important;
      cursor: pointer !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🎓 Claude Code School',
      repo: 'https://github.com/OpenDemon/claude-code-school',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      relativePath: false,
      noEmoji: false,
      // 开启 HTML 渲染（允许 Markdown 中内嵌 HTML）
      markdown: {
        smartypants: true,
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 4,
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [],
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    // 追加 Mermaid 插件，不覆盖已有插件（如 docsify-pagination）
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      // 首页注入作者卡片 + 侧边栏底部作者卡片
      function(hook, vm) {
        // 侧边栏底部作者卡片（用 DOM 操作，不写入 _sidebar.md）
        // 首页内容区作者卡片已内嵌在 README.md 的 HTML 中，无需 JS 注入
        hook.ready(function() {
          var sidebar = document.querySelector('.sidebar');
          if (!sidebar || document.getElementById('sidebar-author-card')) return;
          var card = document.createElement('div');
          card.id = 'sidebar-author-card';
          card.className = 'author-card';
          card.style.cssText = 'flex-direction:column;text-align:center;padding:14px 12px;margin:16px 8px 12px;gap:8px;';
          card.innerHTML = `
            <img class="author-qr-img" src="https://d2xsxph8kpxj0f.cloudfront.net/310519663498638152/movh5AgAvgbrggiNBCwBz2/xiaohongshu-qr_39098fef.jpg" alt="小红书二维码"
              style="width:90px;height:90px;margin:0 auto;display:block;" />
            <div class="author-info" style="text-align:center;">
              <div class="author-name" style="font-size:0.95em;">李叔聊AI</div>
              <div class="author-desc" style="font-size:0.72em;">🚀 YC校友（OpenAI系）· 10年AI经验</div>
              <div class="author-links" style="margin-top:8px;">
                <a href="https://github.com/OpenDemon/claude-code-school" target="_blank" class="author-link github-link" style="font-size:0.78em;">⭐ GitHub</a>
              </div>
              <div class="qr-tip" style="margin-top:4px;">↑ 扫码关注小红书</div>
            </div>
          `;
          sidebar.appendChild(card);
        });
      },
      function(hook) {
        hook.doneEach(function() {
          document.querySelectorAll('.mermaid').forEach(function(el) {
            if (el.getAttribute('data-processed')) return;
            var code = el.textContent;
            var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            try {
              mermaid.render(id, code).then(function(result) {
                el.innerHTML = result.svg;
                el.setAttribute('data-processed', 'true');
              });
            } catch(e) {
              console.warn('Mermaid render error:', e);
            }
          });
        });
      }
    ]);

    // ============================================================
    // 移动端：自定义侧边栏开关逻辑（独立于 Docsify 原生逻辑）
    // ============================================================
    (function() {
      function isMobile() { return window.innerWidth <= 768; }

      function openSidebar() {
        document.body.classList.add('sidebar-open');
      }

      function closeSidebar() {
        document.body.classList.remove('sidebar-open');
      }

      // 拦截汉堡按钮点击，切换侧边栏
      document.addEventListener('click', function(e) {
        if (!isMobile()) return;
        var toggle = document.querySelector('.sidebar-toggle');
        var sidebar = document.querySelector('.sidebar');
        if (!toggle || !sidebar) return;

        if (toggle.contains(e.target)) {
          // 点击汉堡按钮：切换开关
          e.stopPropagation();
          if (document.body.classList.contains('sidebar-open')) {
            closeSidebar();
          } else {
            openSidebar();
          }
          return;
        }

        // 点击遮罩层（侧边栏外区域）：关闭侧边栏
        if (document.body.classList.contains('sidebar-open')) {
          if (!sidebar.contains(e.target)) {
            closeSidebar();
          }
        }
      }, true); // 用捕获阶段拦截，防止 Docsify 自己处理

      // 点击侧边栏内的链接后自动关闭侧边栏
      document.addEventListener('click', function(e) {
        if (!isMobile()) return;
        if (!document.body.classList.contains('sidebar-open')) return;
        var sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;
        // 如果点击的是侧边栏内的链接
        if (sidebar.contains(e.target) && e.target.tagName === 'A') {
          setTimeout(closeSidebar, 150);
        }
      });

      // 页面大小变化时重置状态
      window.addEventListener('resize', function() {
        if (!isMobile()) {
          closeSidebar();
        }
      });
    })();
  </script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
