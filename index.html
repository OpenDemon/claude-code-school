<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Code School — 源码架构学习教程</title>
  <meta name="description" content="从零到一深度解析 Claude Code 源码架构，面向所有对 AI Agent 感兴趣的人">
  <!-- 移动端关键 meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 微信/iOS 全屏 Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <!-- 微信分享 OG -->
  <meta property="og:title" content="Claude Code School — 源码架构学习教程">
  <meta property="og:description" content="从零到一深度解析 Claude Code 512K 行源码，面向所有对 AI Agent 感兴趣的人">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    /* ============================================================
       全局变量
    ============================================================ */
    :root {
      --base-font-size: 15px;
      --theme-color: #E8632A;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #E8632A;
      --sidebar-nav-link-border-color--active: #E8632A;
      --code-theme-background: #1e1e2e;
      --code-theme-text: #cdd6f4;
      --code-inline-background: #2d2d3f;
      --heading-color: #1a1a2e;
    }

    /* ============================================================
       桌面端：侧边栏始终展开
    ============================================================ */
    @media (min-width: 769px) {
      .sidebar {
        left: 0 !important;
        transform: translateX(0) !important;
        width: var(--sidebar-width) !important;
      }
      body.close .sidebar {
        transform: translateX(0) !important;
      }
      .sidebar-toggle {
        display: none !important;
      }
      .content {
        margin-left: var(--sidebar-width) !important;
      }
    }

    /* ============================================================
       移动端（≤768px）：侧边栏抽屉式，默认隐藏
    ============================================================ */
    @media (max-width: 768px) {
      /* 侧边栏：默认隐藏在左侧屏幕外 */
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 85vw !important;
        max-width: 320px !important;
        height: 100% !important;
        z-index: 200 !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        transform: translateX(-100%) !important;
        transition: transform 0.3s ease !important;
        box-shadow: none !important;
        background: #fff !important;
      }

      /* 侧边栏展开状态 */
      body.open .sidebar {
        transform: translateX(0) !important;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15) !important;
      }

      /* 遮罩层 */
      body.open::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: 199;
      }

      /* 汉堡菜单按钮：移动端显示 */
      .sidebar-toggle {
        display: flex !important;
        align-items: center;
        justify-content: center;
        position: fixed !important;
        top: 12px !important;
        left: 12px !important;
        z-index: 300 !important;
        width: 40px !important;
        height: 40px !important;
        background: #E8632A !important;
        border-radius: 8px !important;
        box-shadow: 0 2px 8px rgba(232,99,42,0.4) !important;
        cursor: pointer !important;
      }
      .sidebar-toggle span {
        background: #fff !important;
      }

      /* 内容区：不需要左边距 */
      .content {
        margin-left: 0 !important;
        padding-top: 60px !important; /* 给顶部汉堡按钮留空间 */
      }

      /* 主内容区内边距 */
      .markdown-section {
        padding: 16px !important;
        max-width: 100% !important;
      }

      /* 标题字体缩小 */
      .markdown-section h1 { font-size: 1.5em !important; }
      .markdown-section h2 { font-size: 1.25em !important; }
      .markdown-section h3 { font-size: 1.1em !important; }

      /* 代码块：横向滚动，不溢出 */
      .markdown-section pre {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        max-width: 100% !important;
        white-space: pre !important;
        word-break: normal !important;
        word-wrap: normal !important;
      }
      .markdown-section pre > code {
        white-space: pre !important;
        word-break: normal !important;
      }

      /* 行内代码：允许换行 */
      .markdown-section p code,
      .markdown-section li code {
        word-break: break-all !important;
        white-space: pre-wrap !important;
      }

      /* 表格：横向滚动 */
      .markdown-section table {
        display: block !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        white-space: nowrap !important;
        max-width: 100% !important;
      }

      /* 分页导航：竖向排列 */
      .docsify-pagination-container {
        flex-direction: column !important;
        gap: 12px !important;
      }
      .pagination-item {
        width: 100% !important;
      }
      .pagination-item--next {
        margin-left: 0 !important;
        text-align: left !important;
      }

      /* Mermaid 图：横向滚动 */
      .mermaid {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* 搜索框：全宽 */
      .search input {
        width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 微信底部安全区适配 */
      .content {
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }

    /* ============================================================
       侧边栏标题单行显示（所有屏幕）
    ============================================================ */
    .app-name-link {
      font-weight: 700;
      font-size: 1.0em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .app-name {
      white-space: nowrap;
      overflow: hidden;
    }

    /* ============================================================
       侧边栏分组标题
    ============================================================ */
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      color: #E8632A;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 1.2em 0 0.3em;
    }

    /* ============================================================
       正文样式
    ============================================================ */
    .markdown-section h1 {
      border-bottom: 3px solid #E8632A;
      padding-bottom: 0.4em;
      color: #1a1a2e;
    }
    .markdown-section h2 {
      border-left: 4px solid #E8632A;
      padding-left: 0.6em;
      margin-top: 2em;
    }
    .markdown-section table {
      width: 100%;
    }
    .markdown-section blockquote {
      border-left: 4px solid #E8632A;
      background: #fff8f5;
      padding: 0.8em 1em;
      color: #555;
    }

    /* ============================================================
       代码块：统一黑底灰字
    ============================================================ */
    .markdown-section code {
      background: #1e1e2e !important;
      color: #cdd6f4 !important;
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.88em;
    }
    .markdown-section pre {
      background: #1e1e2e !important;
      border-radius: 8px;
      border: none;
    }
    .markdown-section pre > code {
      background: transparent !important;
      color: #cdd6f4 !important;
      padding: 0;
      font-size: 0.875em;
    }

    /* Prism 语法高亮 */
    .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #6c7086; }
    .token.punctuation { color: #cdd6f4; }
    .token.property, .token.tag, .token.boolean, .token.number,
    .token.constant, .token.symbol { color: #fab387; }
    .token.selector, .token.attr-name, .token.string,
    .token.char, .token.builtin { color: #a6e3a1; }
    .token.operator, .token.entity, .token.url,
    .language-css .token.string, .style .token.string { color: #89dceb; }
    .token.atrule, .token.attr-value, .token.keyword { color: #cba6f7; }
    .token.function { color: #89b4fa; }
    .token.regex, .token.important, .token.variable { color: #f38ba8; }

    /* ============================================================
       作者卡片（侧边栏底部）
    ============================================================ */
    .author-card {
      margin: 1.5em 0.5em 1em;
      padding: 1em;
      background: linear-gradient(135deg, #fff8f5 0%, #fff3ee 100%);
      border: 1px solid #f0d5c8;
      border-radius: 10px;
      text-align: center;
    }
    .author-name {
      font-weight: 700;
      font-size: 1em;
      color: #1a1a2e;
      margin-bottom: 0.3em;
    }
    .author-desc {
      font-size: 0.75em;
      color: #666;
      line-height: 1.5;
      margin-bottom: 0.8em;
    }
    .author-links {
      margin-bottom: 0.8em;
    }
    .author-link {
      display: inline-block;
      padding: 0.3em 0.8em;
      border-radius: 20px;
      font-size: 0.78em;
      font-weight: 600;
      text-decoration: none !important;
      transition: all 0.2s;
    }
    .github-link {
      background: #1a1a2e;
      color: #fff !important;
    }
    .github-link:hover {
      background: #E8632A;
      transform: translateY(-1px);
    }
    .author-qr img {
      width: 110px;
      height: 110px;
      border-radius: 8px;
      border: 2px solid #f0d5c8;
      display: block;
      margin: 0 auto 0.4em;
    }
    .qr-tip {
      font-size: 0.72em;
      color: #999;
    }

    /* ============================================================
       分页导航
    ============================================================ */
    .pagination-item {
      display: flex !important;
      align-items: center;
    }
    .pagination-item a {
      display: block !important;
      pointer-events: auto !important;
      cursor: pointer !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🎓 Claude Code School',
      repo: 'https://github.com/OpenDemon/claude-code-school',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      relativePath: false,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 4,
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [],
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    // 追加 Mermaid 插件，不覆盖已有插件（如 docsify-pagination）
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {
        hook.doneEach(function() {
          document.querySelectorAll('.mermaid').forEach(function(el) {
            if (el.getAttribute('data-processed')) return;
            var code = el.textContent;
            var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            try {
              mermaid.render(id, code).then(function(result) {
                el.innerHTML = result.svg;
                el.setAttribute('data-processed', 'true');
              });
            } catch(e) {
              console.warn('Mermaid render error:', e);
            }
          });
        });
      }
    ]);

    // ============================================================
    // 移动端：点击遮罩关闭侧边栏
    // ============================================================
    document.addEventListener('click', function(e) {
      if (window.innerWidth > 768) return;
      var body = document.body;
      // 点击遮罩（body::after 伪元素区域）关闭侧边栏
      if (body.classList.contains('open')) {
        var sidebar = document.querySelector('.sidebar');
        var toggle = document.querySelector('.sidebar-toggle');
        if (sidebar && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target)) {
          body.classList.remove('open');
          body.classList.add('close');
        }
      }
    });
  </script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
